name: Deploy MCP Server

on:
  pull_request:
    branches:
      - main
    paths:
      - "mcp-server/**"
      - ".github/workflows/deploy-mcp.yml"
  push:
    branches:
      - main
    paths:
      - "mcp-server/**"
      - ".github/workflows/deploy-mcp.yml"

jobs:
  test-e2e-for-mcp:
    name: Run E2E Tests (MCP delegates to services)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_EMBEDDINGS_API_KEY: ${{ secrets.OPENAI_EMBEDDINGS_API_KEY }}
      CLAUDE_MODEL: claude-sonnet-4-20250514
      EMBEDDING_MODEL: text-embedding-3-large
      EMBEDDING_SIMILARITY_THRESHOLD: "0.48"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install e2e + service deps
        run: |
          cd e2e && npm install
          cd ../books-service && npm install
          cd ../analysis-service && npm install
          cd ../chat-service && npm install

      - name: Run E2E integration tests
        run: npm test
        working-directory: e2e

  deploy:
    name: Deploy MCP Server to AWS App Runner
    needs: test-e2e-for-mcp
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify AWS secrets for MCP
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN" ] && missing+=("AWS_ROLE_ARN")
          [ -z "$AWS_REGION" ] && missing+=("AWS_REGION")
          [ -z "$AWS_ACCOUNT_ID" ] && missing+=("AWS_ACCOUNT_ID")
          [ -z "$MCP_APPRUNNER_SERVICE_ARN" ] && missing+=("MCP_APPRUNNER_SERVICE_ARN")
          [ -z "$ECR_ACCESS_ROLE_ARN" ] && missing+=("ECR_ACCESS_ROLE_ARN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: Missing secrets for MCP deployment:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            exit 1
          fi
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          MCP_APPRUNNER_SERVICE_ARN: ${{ secrets.MCP_APPRUNNER_SERVICE_ARN }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push MCP Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: book-app-mcp
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f mcp-server/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./mcp-server
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy MCP to App Runner
        env:
          MCP_APPRUNNER_SERVICE_ARN: ${{ secrets.MCP_APPRUNNER_SERVICE_ARN }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws apprunner update-service \
            --service-arn "$MCP_APPRUNNER_SERVICE_ARN" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'"$ECR_REGISTRY/book-app-mcp:$IMAGE_TAG"'",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "3006"
                }
              },
              "AutoDeploymentsEnabled": false,
              "AuthenticationConfiguration": {
                "AccessRoleArn": "'"$ECR_ACCESS_ROLE_ARN"'"
              }
            }' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/health",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 5
            }'

          echo "MCP deployment triggered. Waiting for service to stabilize..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$MCP_APPRUNNER_SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "  Check $i/30: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "MCP deployment complete — service is running."
              exit 0
            fi
            if echo "$STATUS" | grep -q "FAILED"; then
              echo "ERROR: MCP service entered $STATUS state"
              exit 1
            fi
            sleep 20
          done
          echo "Warning: timed out after 10 min — check App Runner console for status."
