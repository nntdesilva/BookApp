name: CI/CD

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"

jobs:
  lint-branch-name:
    name: Lint Branch Name
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch name follows convention
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|refactor|ci|chore|test|perf|hotfix|revert)\/[a-z0-9][a-z0-9-]*$"
          if ! echo "$BRANCH" | grep -qE "$PATTERN"; then
            echo "Branch name '$BRANCH' does not follow the naming convention."
            echo ""
            echo "Expected format: type/short-description"
            echo "  - type must be one of: feat, fix, refactor, ci, chore, test, perf, hotfix, revert"
            echo "  - description must be lowercase and hyphen-separated"
            echo ""
            echo "Examples:"
            echo "  feat/dark-mode"
            echo "  fix/login-redirect-bug"
            echo "  ci/add-lint-step"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."

  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js
          firstParent: false

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      MONGODB_URI: mongodb://127.0.0.1:27017/bookapp_test
      SESSION_SECRET: test-session-secret
      CLAUDE_MODEL: claude-sonnet-4-20250514
      CLAUDE_TEMPERATURE: "0.7"
      CLAUDE_MAX_TOKENS: "4096"
      MAX_HISTORY_MESSAGES: "15"
      EMBEDDING_MODEL: text-embedding-3-large
      EMBEDDING_SIMILARITY_THRESHOLD: "0.48"
      OPENAI_EMBEDDINGS_API_KEY: ${{ secrets.OPENAI_EMBEDDINGS_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx jest --verbose --testPathIgnorePatterns="tests/integration.test.js"

      - name: Check API key environment variables
        run: |
          echo "--- Checking API key presence and format ---"

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY is empty or not set"
          else
            echo "ANTHROPIC_API_KEY: set (length=${#ANTHROPIC_API_KEY}, prefix=${ANTHROPIC_API_KEY:0:10}...)"
          fi

          if [ -z "$OPENAI_EMBEDDINGS_API_KEY" ]; then
            echo "ERROR: OPENAI_EMBEDDINGS_API_KEY is empty or not set"
          else
            echo "OPENAI_EMBEDDINGS_API_KEY: set (length=${#OPENAI_EMBEDDINGS_API_KEY}, prefix=${OPENAI_EMBEDDINGS_API_KEY:0:10}...)"
          fi

          echo "--- Verifying Node.js can read them ---"
          node -e "
            const key = process.env.ANTHROPIC_API_KEY || '';
            const oaiKey = process.env.OPENAI_EMBEDDINGS_API_KEY || '';
            console.log('ANTHROPIC_API_KEY via node: length=' + key.length + ', starts_with_sk_ant=' + key.startsWith('sk-ant-'));
            console.log('OPENAI_EMBEDDINGS_API_KEY via node: length=' + oaiKey.length + ', starts_with_sk=' + oaiKey.startsWith('sk-'));
          "

      - name: Run integration tests
        run: npx jest --verbose tests/integration.test.js

  deploy:
    name: Deploy to AWS App Runner
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify AWS secrets are configured
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN" ] && missing+=("AWS_ROLE_ARN")
          [ -z "$AWS_REGION" ] && missing+=("AWS_REGION")
          [ -z "$AWS_ACCOUNT_ID" ] && missing+=("AWS_ACCOUNT_ID")
          [ -z "$APPRUNNER_SERVICE_ARN" ] && missing+=("APPRUNNER_SERVICE_ARN")
          [ -z "$ECR_ACCESS_ROLE_ARN" ] && missing+=("ECR_ACCESS_ROLE_ARN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: The following required secrets are not set in this repository:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            echo ""
            echo "Go to: Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: book-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to App Runner
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws apprunner update-service \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'"$ECR_REGISTRY/book-app:$IMAGE_TAG"'",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "8080"
                }
              },
              "AutoDeploymentsEnabled": false,
              "AuthenticationConfiguration": {
                "AccessRoleArn": "'"$ECR_ACCESS_ROLE_ARN"'"
              }
            }' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/health",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 5
            }'

          echo "Deployment triggered. Waiting for service to stabilize..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APPRUNNER_SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "  Check $i/30: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment complete — service is running."
              exit 0
            fi
            if echo "$STATUS" | grep -q "FAILED"; then
              echo "ERROR: service entered $STATUS state"
              exit 1
            fi
            sleep 20
          done
          echo "Warning: timed out after 10 min — check App Runner console for status."
