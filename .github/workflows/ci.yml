name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      MONGODB_URI: mongodb://127.0.0.1:27017/bookapp_test
      SESSION_SECRET: test-session-secret
      ANTHROPIC_API_KEY: test-anthropic-key
      CLAUDE_MODEL: claude-sonnet-4-20250514
      CLAUDE_TEMPERATURE: "0.7"
      CLAUDE_MAX_TOKENS: "4096"
      MAX_HISTORY_MESSAGES: "15"
      OPENAI_EMBEDDINGS_API_KEY: test-openai-key
      EMBEDDING_MODEL: text-embedding-3-large
      EMBEDDING_SIMILARITY_THRESHOLD: "0.48"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx jest --verbose --testPathIgnorePatterns="tests/integration.test.js"
