name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"

jobs:
  # ---------------------------------------------------------------------------
  # Step 1: Lint branch name and PR title (PR only)
  # ---------------------------------------------------------------------------
  lint-branch-name:
    name: Lint Branch Name
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch name follows convention
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|feature|fix|refactor|ci|chore|test|perf|hotfix|revert)\/[a-z0-9][a-z0-9-]*$"
          if ! echo "$BRANCH" | grep -qE "$PATTERN"; then
            echo "Branch name '$BRANCH' does not follow the naming convention."
            echo "Expected format: type/short-description"
            echo "  type must be one of: feat, feature, fix, refactor, ci, chore, test, perf, hotfix, revert"
            echo "  description must be lowercase and hyphen-separated"
            exit 1
          fi
          echo "Branch name '$BRANCH' is valid."

  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  # ---------------------------------------------------------------------------
  # Step 2: Detect which services changed
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      favorites: ${{ steps.filter.outputs.favorites }}
      books: ${{ steps.filter.outputs.books }}
      analysis: ${{ steps.filter.outputs.analysis }}
      chat: ${{ steps.filter.outputs.chat }}
      gateway: ${{ steps.filter.outputs.gateway }}
      any-service: ${{ steps.filter.outputs.any-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth-service/**'
            favorites:
              - 'favorites-service/**'
            books:
              - 'books-service/**'
            analysis:
              - 'analysis-service/**'
            chat:
              - 'chat-service/**'
            gateway:
              - 'gateway/**'
            any-service:
              - 'auth-service/**'
              - 'favorites-service/**'
              - 'books-service/**'
              - 'analysis-service/**'
              - 'chat-service/**'
              - 'gateway/**'
              - 'e2e/**'
              - 'mcp-server/**'

  # ---------------------------------------------------------------------------
  # Step 3: Per-service unit tests (run only when that service changes)
  # ---------------------------------------------------------------------------
  test-auth-service:
    name: Test — auth-service
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://127.0.0.1:27017/bookapp_auth_test
      JWT_SECRET: test-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auth-service/package.json
      - run: npm install
        working-directory: auth-service
      - run: npm test
        working-directory: auth-service

  test-favorites-service:
    name: Test — favorites-service
    needs: detect-changes
    if: needs.detect-changes.outputs.favorites == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: favorites-service/package.json
      - run: npm install
        working-directory: favorites-service
      - run: npm test
        working-directory: favorites-service

  test-books-service:
    name: Test — books-service
    needs: detect-changes
    if: needs.detect-changes.outputs.books == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      EMBEDDING_MODEL: text-embedding-3-large
      EMBEDDING_SIMILARITY_THRESHOLD: "0.48"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: books-service/package.json
      - run: npm install
        working-directory: books-service
      - run: npm test
        working-directory: books-service

  test-analysis-service:
    name: Test — analysis-service
    needs: detect-changes
    if: needs.detect-changes.outputs.analysis == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      CLAUDE_MODEL: claude-sonnet-4-20250514
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: analysis-service/package.json
      - run: npm install
        working-directory: analysis-service
      - run: npm test
        working-directory: analysis-service

  test-chat-service:
    name: Test — chat-service
    needs: detect-changes
    if: needs.detect-changes.outputs.chat == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      CLAUDE_MODEL: claude-sonnet-4-20250514
      CLAUDE_TEMPERATURE: "0.7"
      CLAUDE_MAX_TOKENS: "4096"
      MAX_HISTORY_MESSAGES: "15"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chat-service/package.json
      - run: npm install
        working-directory: chat-service
      - run: npm test
        working-directory: chat-service

  test-gateway:
    name: Test — gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gateway/package.json
      - run: npm install
        working-directory: gateway
      - run: npm test
        working-directory: gateway

  # ---------------------------------------------------------------------------
  # Step 4: E2E integration tests — run when any service changes
  # ---------------------------------------------------------------------------
  test-e2e:
    name: Test — E2E Integration
    needs: detect-changes
    if: needs.detect-changes.outputs.any-service == 'true'
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_EMBEDDINGS_API_KEY: ${{ secrets.OPENAI_EMBEDDINGS_API_KEY }}
      CLAUDE_MODEL: claude-sonnet-4-20250514
      EMBEDDING_MODEL: text-embedding-3-large
      EMBEDDING_SIMILARITY_THRESHOLD: "0.48"
      BOOKS_SERVICE_URL: http://localhost:3003
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install e2e deps
        run: npm install
        working-directory: e2e
      - name: Install service deps (books + analysis + chat for direct imports)
        run: |
          cd books-service && npm install
          cd ../analysis-service && npm install
          cd ../chat-service && npm install
      - name: Run E2E integration tests
        run: npm test
        working-directory: e2e

  # ---------------------------------------------------------------------------
  # Step 5: Required gate — PR cannot merge unless all applicable tests pass
  # ---------------------------------------------------------------------------
  all-tests-pass:
    name: All Relevant Tests Passed
    needs:
      - detect-changes
      - test-auth-service
      - test-favorites-service
      - test-books-service
      - test-analysis-service
      - test-chat-service
      - test-gateway
      - test-e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "auth-service:       ${{ needs.test-auth-service.result }}"
          echo "favorites-service:  ${{ needs.test-favorites-service.result }}"
          echo "books-service:      ${{ needs.test-books-service.result }}"
          echo "analysis-service:   ${{ needs.test-analysis-service.result }}"
          echo "chat-service:       ${{ needs.test-chat-service.result }}"
          echo "gateway:            ${{ needs.test-gateway.result }}"
          echo "e2e:                ${{ needs.test-e2e.result }}"

          for result in \
            "${{ needs.test-auth-service.result }}" \
            "${{ needs.test-favorites-service.result }}" \
            "${{ needs.test-books-service.result }}" \
            "${{ needs.test-analysis-service.result }}" \
            "${{ needs.test-chat-service.result }}" \
            "${{ needs.test-gateway.result }}" \
            "${{ needs.test-e2e.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "One or more test jobs failed!"
              exit 1
            fi
          done

          echo "All applicable tests passed or were correctly skipped."
