        run: |
          aws apprunner update-service \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'"$ECR_REGISTRY/book-app-chat:$IMAGE_TAG"'",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": { "Port": "3005" }
              },
              "AutoDeploymentsEnabled": false,
              "AuthenticationConfiguration": { "AccessRoleArn": "'"$ECR_ACCESS_ROLE_ARN"'" }
            }' \
            --network-configuration '{"IngressConfiguration": {"IsPubliclyAccessible": false}}' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/health",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 5
            }'

          echo "Deployment triggered. Waiting for chat-service to reach RUNNING state..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APPRUNNER_SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "  Check $i/30: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "chat-service deployment complete."
              exit 0
            fi
            if echo "$STATUS" | grep -q "FAILED"; then
              echo "ERROR: chat-service entered $STATUS state."
              exit 1
            fi
            sleep 20
          done
          echo "Warning: timed out after 10 min — check App Runner console."

  deploy-mcp:
    name: Deploy — mcp-server
    needs: detect-changes
    if: needs.detect-changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify required secrets
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN" ]               && missing+=("AWS_ROLE_ARN")
          [ -z "$AWS_REGION" ]                 && missing+=("AWS_REGION")
          [ -z "$ECR_ACCESS_ROLE_ARN" ]        && missing+=("ECR_ACCESS_ROLE_ARN")
          [ -z "$MCP_APPRUNNER_SERVICE_ARN" ]  && missing+=("MCP_APPRUNNER_SERVICE_ARN")
          [ -z "$VPC_CONNECTOR_ARN" ]          && missing+=("VPC_CONNECTOR_ARN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: Missing GitHub secrets:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            exit 1
          fi
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}
          MCP_APPRUNNER_SERVICE_ARN: ${{ secrets.MCP_APPRUNNER_SERVICE_ARN }}
          VPC_CONNECTOR_ARN: ${{ secrets.VPC_CONNECTOR_ARN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push mcp-server image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: book-app-mcp
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./mcp-server
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy mcp-server to App Runner
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.MCP_APPRUNNER_SERVICE_ARN }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          VPC_CONNECTOR_ARN: ${{ secrets.VPC_CONNECTOR_ARN }}
        run: |
          aws apprunner update-service \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'"$ECR_REGISTRY/book-app-mcp:$IMAGE_TAG"'",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": { "Port": "3006" }
              },
              "AutoDeploymentsEnabled": false,
              "AuthenticationConfiguration": { "AccessRoleArn": "'"$ECR_ACCESS_ROLE_ARN"'" }
            }' \
            --network-configuration '{
              "EgressConfiguration": {
                "EgressType": "VPC",
                "VpcConnectorArn": "'"$VPC_CONNECTOR_ARN"'"
              }
            }' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/health",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 5
            }'

          echo "Deployment triggered. Waiting for mcp-server to reach RUNNING state..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APPRUNNER_SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "  Check $i/30: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "mcp-server deployment complete."
              exit 0
            fi
            if echo "$STATUS" | grep -q "FAILED"; then
              echo "ERROR: mcp-server entered $STATUS state."
              exit 1
            fi
            sleep 20
          done
          echo "Warning: timed out after 10 min — check App Runner console."
