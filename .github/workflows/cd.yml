name: CD

# Triggers only after the CI workflow completes successfully on main.
# This guarantees every deployment has passed all tests.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  # ---------------------------------------------------------------------------
  # Step 1: Detect which services changed in the merged commit
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      auth: ${{ steps.filter.outputs.auth }}
      favorites: ${{ steps.filter.outputs.favorites }}
      books: ${{ steps.filter.outputs.books }}
      analysis: ${{ steps.filter.outputs.analysis }}
      chat: ${{ steps.filter.outputs.chat }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - '.github/workflows/cd.yml'
            auth:
              - 'auth-service/**'
            favorites:
              - 'favorites-service/**'
            books:
              - 'books-service/**'
            analysis:
              - 'analysis-service/**'
            chat:
              - 'chat-service/**'
            mcp:
              - 'mcp-server/**'

  # ---------------------------------------------------------------------------
  # Step 2: Deploy each service independently (only when its files changed)
  # ---------------------------------------------------------------------------

  deploy-gateway:
    name: Deploy — gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify required secrets
        run: |
          missing=()
          [ -z "$AWS_ROLE_ARN" ]                  && missing+=("AWS_ROLE_ARN")
          [ -z "$AWS_REGION" ]                    && missing+=("AWS_REGION")
          [ -z "$ECR_ACCESS_ROLE_ARN" ]           && missing+=("ECR_ACCESS_ROLE_ARN")
          [ -z "$GATEWAY_APPRUNNER_SERVICE_ARN" ] && missing+=("GATEWAY_APPRUNNER_SERVICE_ARN")
          [ -z "$VPC_CONNECTOR_ARN" ]             && missing+=("VPC_CONNECTOR_ARN")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "ERROR: Missing GitHub secrets:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            exit 1
          fi
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}
          GATEWAY_APPRUNNER_SERVICE_ARN: ${{ secrets.GATEWAY_APPRUNNER_SERVICE_ARN }}
          VPC_CONNECTOR_ARN: ${{ secrets.VPC_CONNECTOR_ARN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push gateway image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: book-app
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ./gateway
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy gateway to App Runner
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.GATEWAY_APPRUNNER_SERVICE_ARN }}
          ECR_ACCESS_ROLE_ARN: ${{ secrets.ECR_ACCESS_ROLE_ARN }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          VPC_CONNECTOR_ARN: ${{ secrets.VPC_CONNECTOR_ARN }}
        run: |
          aws apprunner update-service \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "'"$ECR_REGISTRY/book-app:$IMAGE_TAG"'",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": { "Port": "3000" }
              },
              "AutoDeploymentsEnabled": false,
              "AuthenticationConfiguration": { "AccessRoleArn": "'"$ECR_ACCESS_ROLE_ARN"'" }
            }' \
            --network-configuration '{
              "EgressConfiguration": {
                "EgressType": "VPC",
                "VpcConnectorArn": "'"$VPC_CONNECTOR_ARN"'"
              }
            }' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/health",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 5
            }'

          echo "Deployment triggered. Waiting for gateway to reach RUNNING state..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APPRUNNER_SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "  Check $i/30: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "gateway deployment complete."
              exit 0
            fi
            if echo "$STATUS" | grep -q "FAILED"; then
              echo "ERROR: gateway entered $STATUS state."
              exit 1
            fi
            sleep 20
          done
          echo "Warning: timed out after 10 min — check App Runner console."

