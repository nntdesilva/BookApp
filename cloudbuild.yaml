steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/book-app/book-app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/book-app/book-app:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/book-app/book-app'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'book-app'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/book-app/book-app:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--update-env-vars'
      - 'CLAUDE_MODEL=claude-sonnet-4-5,NODE_ENV=production'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/book-app/book-app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/book-app/book-app:latest'
